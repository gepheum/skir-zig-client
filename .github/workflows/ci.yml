name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION="0.15.2"
          MACHINE_ARCH="$(uname -m)"
          case "$MACHINE_ARCH" in
            x86_64)
              TARGET="x86_64-linux"
              ;;
            aarch64)
              TARGET="aarch64-linux"
              ;;
            *)
              echo "Unsupported architecture: $MACHINE_ARCH" >&2
              exit 1
              ;;
          esac

            ZIG_URL="$(curl -fsSL "https://ziglang.org/download/index.json" | python3 -c 'import json,sys; version,target=sys.argv[1],sys.argv[2]; data=json.load(sys.stdin); entry=data.get(version, {}).get(target) or data.get("master", {}).get(target); print(entry["tarball"] if entry else "")' "$ZIG_VERSION" "$TARGET")"
            if [ -z "$ZIG_URL" ]; then
            echo "No Zig binary found for target $TARGET" >&2
            exit 1
            fi

          echo "Installing Zig from: $ZIG_URL"
          ZIG_DIR="$RUNNER_TEMP/zig-$TARGET"
          curl -fsSL "$ZIG_URL" -o "$RUNNER_TEMP/zig.tar.xz"
          mkdir -p "$ZIG_DIR"
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$ZIG_DIR" --strip-components=1
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Verify Zig installation
        run: zig version

      - name: Check formatting
        run: zig fmt --check src/skir_client.zig build.zig

      - name: Build (Debug)
        run: zig build -Doptimize=Debug

      - name: Run tests (Debug)
        run: zig build test -Doptimize=Debug

      - name: Run tests (ReleaseSafe)
        run: zig build test -Doptimize=ReleaseSafe

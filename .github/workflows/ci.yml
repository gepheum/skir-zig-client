name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION="0.15.0"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|aarch64) ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac
          ZIG_DIR="$RUNNER_TEMP/zig-$ZIG_VERSION-$ARCH"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-${ARCH}-${ZIG_VERSION}.tar.xz" -o "$RUNNER_TEMP/zig.tar.xz"
          mkdir -p "$ZIG_DIR"
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$ZIG_DIR" --strip-components=1
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Verify Zig installation
        run: zig version

      - name: Check formatting
        run: zig fmt --check src/skir_client.zig build.zig

      - name: Build (Debug)
        run: zig build -Doptimize=Debug

      - name: Run tests (Debug)
        run: zig build test -Doptimize=Debug

      - name: Run tests (ReleaseSafe)
        run: zig build test -Doptimize=ReleaseSafe

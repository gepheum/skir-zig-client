name: Deploy

# Zig packages are distributed via GitHub releases. Consumers reference this
# package by the tarball URL + hash in their build.zig.zon. No central registry
# upload step is needed — creating the GitHub release IS the publish step.
#
# To publish a new version:
#   1. Update .version in build.zig.zon
#   2. Push a tag: git tag v<version> && git push origin v<version>
#   3. This workflow creates the GitHub Release automatically, which makes the
#      package available for consumers via:
#        zig fetch --save https://github.com/gepheum/skir/archive/refs/tags/v<version>.tar.gz

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Zig
        shell: bash
        run: |
          set -euo pipefail
          ZIG_VERSION="0.15.0"
          MACHINE_ARCH="$(uname -m)"
          case "$MACHINE_ARCH" in
            x86_64)
              TARGET="x86_64-linux"
              ;;
            aarch64)
              TARGET="aarch64-linux"
              ;;
            *)
              echo "Unsupported architecture: $MACHINE_ARCH" >&2
              exit 1
              ;;
          esac

          ZIG_URL="$(curl -fsSL "https://ziglang.org/download/index.json" | python3 - "$ZIG_VERSION" "$TARGET" <<'PY'
import json
import sys

version = sys.argv[1]
target = sys.argv[2]
data = json.load(sys.stdin)

if version in data and target in data[version]:
    print(data[version][target]["tarball"])
elif "master" in data and target in data["master"]:
    print(data["master"][target]["tarball"])
else:
    sys.exit(f"No Zig binary found for target {target}")
PY
)"

          echo "Installing Zig from: $ZIG_URL"
          ZIG_DIR="$RUNNER_TEMP/zig-$TARGET"
          curl -fsSL "$ZIG_URL" -o "$RUNNER_TEMP/zig.tar.xz"
          mkdir -p "$ZIG_DIR"
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$ZIG_DIR" --strip-components=1
          echo "$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Run tests
        run: zig build test -Doptimize=ReleaseSafe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
